<div class="form-container">
    <div class="container">
        <!-- Page Header -->
        <div class="page-header">
            <div class="header-content">
                <div class="header-title">
                    <i class="fas fa-edit"></i>
                    <div>
                        <h1 class="page-title">{{ title }}</h1>
                        <p class="page-subtitle">{{ isViewMode ? 'View item details' : 'Edit item information' }}</p>
                    </div>
                </div>
                <div class="header-actions">
                    <a routerLink="/add/item" class="btn btn-outline-secondary">
                        <i class="fas fa-list"></i>
                        View Items
                    </a>
                </div>
            </div>
        </div>

        <!-- Form Card -->
        <div class="form-card">
            <div class="card">
                <div class="card-header">
                    <h5><i class="fas fa-edit"></i> Item Information</h5>
                </div>
                <div class="card-body">
                    <form [formGroup]="form" (ngSubmit)="save()" class="item-form">
                        <!-- Item Name -->
                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-tag"></i>
                                Item Name
                            </label>
                            <input
                                type="text"
                                class="form-control"
                                formControlName="name"
                                placeholder="Enter item name"
                                [readonly]="isViewMode"
                                [ngClass]="{ 'is-invalid': form.get('name')?.invalid && form.get('name')?.touched }"
                            />
                            <div class="invalid-feedback" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
                                Item name is required
                            </div>
                        </div>

                        <!-- Category and Brand Row -->
                        <div class="form-row">
                            <!-- Category Input with Datalist -->
                            <div class="form-group col-md-6">
                                <label for="category" class="form-label">
                                    <i class="fas fa-folder"></i>
                                    Category
                                </label>
                                <input
                                    type="text"
                                    id="category"
                                    class="form-control"
                                    [formControl]="categoryNameControl"
                                    placeholder="Type or select a category"
                                    autocomplete="off"
                                    [readonly]="isViewMode"
                                    (input)="searchCategories($event)"
                                    list="category-list"
                                    [ngClass]="{ 'is-invalid': submitted && form.get('categoryId')?.invalid }"
                                />
                                <datalist id="category-list">
                                    <option *ngFor="let category of categories" [value]="category.name"></option>
                                </datalist>
                                <div *ngIf="submitted && form.get('categoryId')?.invalid" class="invalid-feedback">
                                    <div *ngIf="form.get('categoryId')?.errors?.['required']">Category is required.</div>
                                </div>
                            </div>

                            <!-- Brand Input with Datalist -->
                            <div class="form-group col-md-6">
                                <label for="brand" class="form-label">
                                    <i class="fas fa-trademark"></i>
                                    Brand
                                </label>
                                <input
                                    type="text"
                                    id="brand"
                                    class="form-control"
                                    [formControl]="brandNameControl"
                                    placeholder="Type or select a brand"
                                    autocomplete="off"
                                    [readonly]="isViewMode"
                                    (input)="searchBrands($event)"
                                    list="brand-list"
                                    [ngClass]="{ 'is-invalid': submitted && form.get('brandId')?.invalid }"
                                />
                                <datalist id="brand-list">
                                    <option *ngFor="let brand of brands" [value]="brand.name"></option>
                                </datalaligst>
                                <div *ngIf="submitted && form.get('brandId')?.invalid" class="invalid-feedback">
                                    <div *ngIf="form.get('brandId')?.errors?.['required']">Brand is required.</div>
                                </div>
                            </div>
                        </div>

                        <!-- Description -->
                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-align-left"></i>
                                Description
                            </label>
                            <textarea
                                class="form-control"
                                formControlName="description"
                                placeholder="Enter item description (optional)"
                                rows="4"
                                [readonly]="isViewMode"
                            ></textarea>
                        </div>

                        <!-- Form Actions -->
                        <div class="form-actions">
                            <button type="button" class="btn btn-outline-secondary" routerLink="/add/item">
                                <i class="fas fa-times"></i>
                                Cancel
                            </button>
                            <button *ngIf="!isViewMode" type="submit" class="btn btn-primary" [disabled]="loading">
                                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                                <i *ngIf="!loading" class="fas fa-save me-2"></i>
                                {{ loading ? 'Saving...' : 'Save Changes' }}
                            </button>
                            <a *ngIf="isViewMode" routerLink="/add/item" class="btn btn-primary">
                                <i class="fas fa-list me-2"></i>
                                Back to List
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
